<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- Theme Toggle -->

        <div class="theme-toggle">

            <button id="themeBtn">🌙 Dark</button>

        </div>



        <!-- Search Section -->

        <div class="search-section">

            <input type="text" id="cityInput" placeholder="Enter city name..." />

            <button id="searchBtn">Search Weather</button>

        </div>

        <div id="spinner" class="spinner" style="display: none;"></div>

        <!-- Weather Display -->

        <div id="weatherCard" class="weather-card" style="display:none;">
            <h2 class="showCity"></h2>
            <p class="showTemp"></p>
            <p>Humidity: <span class="showHumidity"></span></p>
            <p class="descWeather"></p>

            <button onclick="addFavorite(document.querySelector('.showCity').textContent)">
                ⭐ Add to Favorites
            </button>
        </div>
        <!-- Error Message -->

        <div id="errorMsg" class="error" style="display: none;">
            <p class="showError">Error message</p>
        </div>

        <div class="favorites-section">

            <h3>Favorites</h3>

            <div id="favoritesList"></div>

        </div>
    </div>


    <script src="script.js"></script>


</body>

</html>
